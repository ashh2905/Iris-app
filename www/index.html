<!DOCTYPE html>

    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #000; color: cyan;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        #status { font-size: 1.2rem; margin-top: 20px; text-shadow: 0 0 10px cyan; }
        .glow-circle {
            width: 150px; height: 150px;
            border-radius: 50%;
            border: 2px solid cyan;
            box-shadow: 0 0 20px cyan, inset 0 0 20px cyan;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; box-shadow: 0 0 40px cyan, inset 0 0 20px cyan; }
            100% { transform: scale(1); opacity: 0.8; }
        }
    </style>
</head>

        // Redirect logic to bypass Iframe and use Native permissions

            console.log("IRIS Native Bridge Active");
            // Hum Hugging Face ko redirect kar rahe hain but within the App's secure context
            // Isse Capacitor ke permissions carry forward honge
            setTimeout(() => {
                window.location.href = "https://ashh2905-iris-ai.hf.space";
            }, 1000);
