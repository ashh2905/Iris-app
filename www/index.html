<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>IRIS</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--blue:#00d4ff;--red:#ff3030;--green:#00ff88;--dark:#000a14;--glow:0 0 25px rgba(0,212,255,0.6);}
html,body{height:100%;overflow:hidden;background:var(--dark);color:var(--blue);font-family:'Rajdhani',sans-serif;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.025) 1px,transparent 1px);background-size:50px 50px;pointer-events:none;z-index:0;}
#app{position:relative;z-index:10;width:100%;max-width:500px;height:100vh;margin:0 auto;display:flex;flex-direction:column;align-items:center;padding:8px 12px;}
.hc{position:fixed;width:55px;height:55px;pointer-events:none;z-index:20;}
.hc::before,.hc::after{content:'';position:absolute;background:var(--blue);opacity:0.25;}
.hc.tl{top:6px;left:6px;}.hc.tl::before{width:2px;height:100%;}.hc.tl::after{width:100%;height:2px;}
.hc.tr{top:6px;right:6px;}.hc.tr::before{width:2px;height:100%;right:0;}.hc.tr::after{width:100%;height:2px;}
.hc.bl{bottom:6px;left:6px;}.hc.bl::before{width:2px;height:100%;bottom:0;}.hc.bl::after{width:100%;height:2px;bottom:0;}
.hc.br{bottom:6px;right:6px;}.hc.br::before{width:2px;height:100%;bottom:0;right:0;}.hc.br::after{width:100%;height:2px;bottom:0;}
/* LOGIN */
#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:28px;width:100%;}
.login-ring-wrap{position:relative;width:180px;height:180px;}
.login-ring-wrap svg{width:100%;height:100%;animation:spin-slow 10s linear infinite;}
@keyframes spin-slow{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.login-iris-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;}
.login-iris-text span:first-child{font-family:'Orbitron',monospace;font-size:30px;font-weight:900;color:var(--blue);text-shadow:0 0 30px var(--blue);}
.login-iris-text span:last-child{font-size:9px;letter-spacing:0.3em;color:rgba(0,212,255,0.35);text-transform:uppercase;}
.login-sub{font-size:10px;letter-spacing:0.35em;color:rgba(0,212,255,0.3);text-transform:uppercase;}
.login-box{display:flex;flex-direction:column;gap:12px;width:100%;max-width:260px;}
.hud-inp{width:100%;background:rgba(0,212,255,0.04);border:1px solid rgba(0,212,255,0.2);border-radius:2px;padding:13px 16px;color:var(--blue);font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:600;letter-spacing:0.2em;outline:none;text-align:center;transition:all 0.3s;}
.hud-inp:focus{border-color:var(--blue);box-shadow:var(--glow);}
.hud-inp::placeholder{color:rgba(0,212,255,0.2);}
.hud-btn{width:100%;padding:13px;background:transparent;border:1px solid var(--blue);border-radius:2px;color:var(--blue);font-family:'Orbitron',monospace;font-size:11px;font-weight:700;letter-spacing:0.25em;cursor:pointer;transition:all 0.3s;}
.login-err{color:var(--red);font-size:11px;letter-spacing:0.15em;text-align:center;display:none;}
/* MAIN */
#main{display:none;flex-direction:column;align-items:center;width:100%;height:100vh;padding:6px 8px;}
.top-bar{display:flex;justify-content:space-between;align-items:center;width:100%;padding:0 2px 8px;border-bottom:1px solid rgba(0,212,255,0.08);}
.wake-btn{background:transparent;border:1px solid rgba(0,255,136,0.25);border-radius:2px;color:rgba(0,255,136,0.4);padding:4px 8px;font-size:9px;font-family:'Orbitron',monospace;letter-spacing:0.1em;cursor:pointer;transition:all 0.3s;}
.wake-btn.active{border-color:var(--green);color:var(--green);box-shadow:0 0 10px rgba(0,255,136,0.3);}
.status-row{display:flex;align-items:center;gap:5px;}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.2;}}
.slabel{font-size:9px;letter-spacing:0.2em;color:rgba(0,212,255,0.45);font-family:'Orbitron',monospace;}
.reset-btn{background:transparent;border:1px solid rgba(255,48,48,0.2);border-radius:2px;color:rgba(255,48,48,0.4);padding:4px 8px;font-size:9px;font-family:'Orbitron',monospace;letter-spacing:0.1em;cursor:pointer;}
/* JARVIS CIRCLE */
.jarvis-wrap{position:relative;width:280px;height:280px;flex-shrink:0;margin:4px 0;}
.jarvis-wrap svg.rings{position:absolute;inset:0;width:100%;height:100%;}
.jarvis-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;pointer-events:none;}
.iris-main-name{font-family:'Orbitron',monospace;font-size:24px;font-weight:900;color:var(--blue);text-shadow:0 0 20px var(--blue),0 0 50px rgba(0,212,255,0.5);letter-spacing:0.3em;}
.circle-status{font-size:9px;letter-spacing:0.3em;color:rgba(0,212,255,0.4);font-family:'Orbitron',monospace;}
.waveform{display:flex;align-items:center;gap:3px;height:24px;}
.wb{width:3px;background:var(--blue);border-radius:2px;height:4px;opacity:0.3;}
.wb.on{opacity:1;}
.wb.on:nth-child(1){animation:wa 0.5s ease-in-out infinite alternate;}
.wb.on:nth-child(2){animation:wa 0.5s ease-in-out 0.08s infinite alternate;}
.wb.on:nth-child(3){animation:wa 0.5s ease-in-out 0.16s infinite alternate;}
.wb.on:nth-child(4){animation:wa 0.5s ease-in-out 0.08s infinite alternate;}
.wb.on:nth-child(5){animation:wa 0.5s ease-in-out 0s infinite alternate;}
@keyframes wa{from{height:4px;}to{height:20px;}}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(0,212,255,0.15);border:1px solid rgba(0,212,255,0.4);border-radius:4px;padding:8px 16px;font-size:12px;color:var(--blue);z-index:100;display:none;font-family:'Orbitron',monospace;}
#chat-box{flex:1;overflow-y:auto;width:100%;padding:4px 2px;display:flex;flex-direction:column;gap:8px;scrollbar-width:none;}
#chat-box::-webkit-scrollbar{display:none;}
.msg{display:flex;flex-direction:column;max-width:90%;animation:mi 0.2s ease;}
@keyframes mi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.msg.iris{align-self:flex-start;}
.msg-label{font-size:9px;letter-spacing:0.2em;margin-bottom:3px;opacity:0.35;font-family:'Orbitron',monospace;color:var(--blue);}
.msg-bubble{padding:9px 13px;font-size:14px;line-height:1.5;background:rgba(0,212,255,0.04);border:1px solid rgba(0,212,255,0.12);color:#a8e6f8;border-radius:2px 2px 2px 0;}
.input-bar{width:100%;display:flex;gap:6px;align-items:flex-end;padding:8px 0 4px;border-top:1px solid rgba(0,212,255,0.08);}
#txt-inp{flex:1;background:rgba(0,212,255,0.03);border:1px solid rgba(0,212,255,0.12);border-radius:2px;padding:10px 12px;color:#a8e6f8;font-family:'Rajdhani',sans-serif;font-size:15px;outline:none;resize:none;max-height:80px;scrollbar-width:none;transition:border-color 0.3s;}
#txt-inp:focus{border-color:rgba(0,212,255,0.4);}
#txt-inp::placeholder{color:rgba(0,212,255,0.15);}
.mic-btn{padding:10px 13px;background:transparent;border:1px solid rgba(255,48,48,0.3);border-radius:2px;color:var(--red);font-size:16px;cursor:pointer;transition:all 0.3s;}
.mic-btn.on{border-color:var(--red);background:rgba(255,48,48,0.08);animation:pr 0.8s infinite;}
@keyframes pr{0%,100%{box-shadow:0 0 5px rgba(255,48,48,0.3);}50%{box-shadow:0 0 18px rgba(255,48,48,0.7);}}
.send-btn{padding:10px 13px;background:transparent;border:1px solid rgba(0,212,255,0.3);border-radius:2px;color:var(--blue);font-family:'Orbitron',monospace;font-size:10px;font-weight:700;letter-spacing:0.1em;cursor:pointer;}
</style>
</head>
<body>
<div class="hc tl"></div><div class="hc tr"></div>
<div class="hc bl"></div><div class="hc br"></div>
<div class="toast" id="toast"></div>
<div id="app">
  <div id="login-screen">
    <div class="login-ring-wrap">
      <svg viewBox="0 0 180 180" fill="none">
        <circle cx="90" cy="90" r="85" stroke="rgba(0,212,255,0.08)" stroke-width="1"/>
        <path d="M90 5 A85 85 0 0 1 175 90" stroke="#00d4ff" stroke-width="2" stroke-linecap="round"/>
        <path d="M90 175 A85 85 0 0 1 5 90" stroke="#00d4ff" stroke-width="1" stroke-linecap="round" opacity="0.2"/>
        <circle cx="90" cy="5" r="3" fill="#00d4ff"/>
      </svg>
      <div class="login-iris-text">
        <span>IRIS</span>
        <span>AI SYSTEM</span>
      </div>
    </div>
    <div class="login-sub">Integrated Responsive Intelligence System</div>
    <div class="login-box">
      <input type="password" class="hud-inp" id="pwd" placeholder="ACCESS CODE" autocomplete="off">
      <button class="hud-btn" onclick="doLogin()">INITIALIZE</button>
      <div class="login-err" id="login-err">⚠ ACCESS DENIED</div>
    </div>
  </div>

  <div id="main">
    <div class="top-bar">
      <button class="wake-btn" id="wake-btn" onclick="toggleWake()">👂 HEY IRIS</button>
      <div class="status-row">
        <div class="sdot"></div>
        <div class="slabel" id="stxt">ONLINE</div>
      </div>
      <button class="reset-btn" onclick="clearMem()">⟳ RESET</button>
    </div>

    <div class="jarvis-wrap">
      <svg class="rings" viewBox="0 0 300 300" fill="none">
        <defs>
          <radialGradient id="cg" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.25"/>
            <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
          </radialGradient>
          <radialGradient id="ig" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#001828"/>
            <stop offset="100%" stop-color="#000810"/>
          </radialGradient>
          <filter id="gf"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          <filter id="pf"><feGaussianBlur stdDeviation="8"/></filter>
        </defs>
        <g id="ring5"><circle cx="150" cy="150" r="138" stroke="rgba(0,212,255,0.05)" stroke-width="0.5"/><path d="M150 12 A138 138 0 0 1 288 150" stroke="rgba(0,212,255,0.2)" stroke-width="0.8" stroke-linecap="round"/></g>
        <g id="ring4"><circle cx="150" cy="150" r="122" stroke="rgba(0,212,255,0.07)" stroke-width="0.5"/><path d="M150 28 A122 122 0 0 1 272 150" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round" filter="url(#gf)" opacity="0.5"/></g>
        <g id="ring1"><circle cx="150" cy="150" r="106" stroke="rgba(0,212,255,0.1)" stroke-width="0.8"/><path d="M150 44 A106 106 0 0 1 256 150" stroke="#00d4ff" stroke-width="2.5" stroke-linecap="round" filter="url(#gf)"/><circle cx="150" cy="44" r="3.5" fill="#00d4ff" filter="url(#gf)"/></g>
        <g id="ring2"><circle cx="150" cy="150" r="88" stroke="rgba(0,212,255,0.08)" stroke-width="0.5"/><path d="M150 62 A88 88 0 0 0 238 150" stroke="#00ccff" stroke-width="2" stroke-linecap="round" filter="url(#gf)" opacity="0.6"/></g>
        <g id="ring3"><circle cx="150" cy="150" r="72" stroke="rgba(0,212,255,0.1)" stroke-width="0.8"/><path d="M150 78 A72 72 0 0 1 222 150" stroke="#00d4ff" stroke-width="1.8" stroke-linecap="round" filter="url(#gf)" opacity="0.7"/></g>
        <circle cx="150" cy="150" r="55" fill="url(#cg)" id="pg"/>
        <circle cx="150" cy="150" r="55" fill="transparent" stroke="rgba(0,212,255,0.15)" stroke-width="20" filter="url(#pf)" id="pg2" opacity="0.3"/>
        <circle cx="150" cy="150" r="58" fill="url(#ig)" stroke="rgba(0,212,255,0.3)" stroke-width="1.5" filter="url(#gf)"/>
      </svg>
      <div class="jarvis-center">
        <div class="iris-main-name">IRIS</div>
        <div class="waveform" id="wvf">
          <div class="wb"></div><div class="wb"></div><div class="wb"></div><div class="wb"></div><div class="wb"></div>
        </div>
        <div class="circle-status" id="cstatus">READY</div>
      </div>
    </div>

    <div id="chat-box"></div>
    <div class="input-bar">
      <textarea id="txt-inp" placeholder="Message IRIS..." rows="1" oninput="aResize(this)" onkeydown="hKey(event)"></textarea>
      <button class="mic-btn" id="mic-btn" onclick="toggleVoice()">🎤</button>
      <button class="send-btn" onclick="sendMsg()">SEND</button>
    </div>
  </div>
</div>

<script>
// ===== CONFIG =====
const API = 'https://ashh2905-iris-ai.hf.space';
let PWD = '', isSpeaking = false, wakeOn = false, wakeRec = null, voiceRec = null, isListening = false;

// ===== CAPACITOR SETUP =====
let Contacts = null, App = null;
document.addEventListener('deviceready', initCapacitor, false);
window.addEventListener('load', () => { setTimeout(initCapacitor, 500); });

async function initCapacitor() {
  try {
    if (window.Capacitor && window.Capacitor.Plugins) {
      App = window.Capacitor.Plugins.App;
      Contacts = window.Capacitor.Plugins.Contacts;
      if (Contacts) {
        await Contacts.requestPermissions();
        console.log('Contacts permission granted!');
      }
    }
  } catch(e) { console.log('Capacitor init:', e); }
}

// ===== GET CONTACT NUMBER =====
async function getContactNumber(name) {
  if (!Contacts) return null;
  try {
    const result = await Contacts.getContacts({
      projection: { name: true, phones: true }
    });
    const contacts = result.contacts || [];
    const nameLower = name.toLowerCase().trim();
    const match = contacts.find(c => {
      const displayName = (c.name && c.name.display) ? c.name.display.toLowerCase() : '';
      return displayName.includes(nameLower);
    });
    if (match && match.phones && match.phones.length > 0) {
      return match.phones[0].number.replace(/[\s\-\(\)]/g, '');
    }
  } catch(e) { console.log('Contact error:', e); }
  return null;
}

// ===== OPEN URL =====
async function openUrl(url) {
  try {
    if (App) { await App.openUrl({ url }); }
    else { window.location.href = url; }
  } catch(e) { window.open(url, '_blank'); }
}

// ===== RING ANIMATION =====
const rings = ['ring1','ring2','ring3','ring4','ring5'].map(id => document.getElementById(id));
const pg = document.getElementById('pg'), pg2 = document.getElementById('pg2');
let angles = [0,0,0,0,0], pv = 0, pv2 = 0;
const speeds = [0.6, -0.4, 0.25, -0.12, 0.07];
function animRings() {
  angles = angles.map((a, i) => a + speeds[i]);
  pv += 0.04; pv2 += 0.02;
  rings.forEach((r, i) => {
    if(r) r.style.cssText = `transform:rotate(${angles[i]}deg);transform-origin:150px 150px`;
  });
  if(pg) pg.setAttribute('opacity', 0.2 + Math.sin(pv) * 0.12);
  if(pg2) pg2.setAttribute('opacity', 0.25 + Math.sin(pv2) * 0.15);
  requestAnimationFrame(animRings);
}
animRings();

// ===== HELPERS =====
function setStatus(t) {
  const s = document.getElementById('stxt');
  const c = document.getElementById('cstatus');
  if(s) s.textContent = t;
  if(c) c.textContent = t;
}
function setWave(on) {
  document.querySelectorAll('.wb').forEach(b => on ? b.classList.add('on') : b.classList.remove('on'));
}
function showToast(msg, d=3000) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', d);
}
function addMsg(text) {
  const clean = cleanReply(text);
  if(!clean) return;
  const box = document.getElementById('chat-box');
  const d = document.createElement('div');
  d.className = 'msg iris';
  d.innerHTML = `<div class="msg-label">IRIS</div><div class="msg-bubble">${clean}</div>`;
  box.appendChild(d);
  box.scrollTop = box.scrollHeight;
}
function cleanReply(r) {
  return r.replace(/\[(YT|WA|GS|MAP|CALL|ALARM|TIMER|CALC|NOTE):[^\]]*\]/g,'').trim();
}

// ===== LOGIN =====
async function doLogin() {
  const pwd = document.getElementById('pwd').value.trim();
  if(!pwd) return;
  setStatus('CONNECTING...');
  try {
    const r = await fetch(`${API}/chat`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({message:'hello', password:pwd})
    });
    if(r.status === 401) {
      document.getElementById('login-err').style.display = 'block';
      document.getElementById('pwd').value = '';
      setStatus('DENIED');
      return;
    }
    const data = await r.json();
    PWD = pwd;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main').style.display = 'flex';
    setStatus('ONLINE');
    addMsg(data.reply);
    speakText(data.reply);
  } catch(e) {
    document.getElementById('login-err').style.display = 'block';
    setStatus('ERROR');
  }
}
document.getElementById('pwd').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

// ===== ACTION HANDLER =====
async function handleAction(reply) {
  // CALL
  const call = reply.match(/\[CALL:(.*?)\]/);
  if(call) {
    const nameOrNum = call[1].trim();
    let number = nameOrNum.replace(/\D/g,'');
    if(number.length < 7) {
      showToast(`📞 ${nameOrNum} ko dhundh rahi hoon...`);
      const found = await getContactNumber(nameOrNum);
      if(found) { number = found; }
      else { showToast(`❌ "${nameOrNum}" contacts mein nahi mila!`, 4000); return; }
    }
    showToast(`📞 Calling ${nameOrNum}...`);
    await openUrl(`tel:${number}`);
  }

  // WHATSAPP
  const wa = reply.match(/\[WA:(.*?):(.*?)\]/);
  if(wa) {
    const nameOrNum = wa[1].trim();
    const message = wa[2].trim();
    let number = nameOrNum.replace(/\D/g,'');
    if(number.length < 7) {
      showToast(`💬 ${nameOrNum} ka number dhundh rahi hoon...`);
      const found = await getContactNumber(nameOrNum);
      if(found) { number = found; }
      else { showToast(`❌ "${nameOrNum}" contacts mein nahi mila!`, 4000); return; }
    }
    if(!number.startsWith('91') && number.length === 10) number = '91' + number;
    await openUrl(`https://wa.me/${number}?text=${encodeURIComponent(message)}`);
  }

  // YOUTUBE
  const yt = reply.match(/\[YT:(.*?)\]/);
  if(yt) {
    const query = encodeURIComponent(yt[1]);
    try {
      await openUrl(`vnd.youtube://results?search_query=${query}`);
    } catch(e) {
      await openUrl(`https://www.youtube.com/results?search_query=${query}`);
    }
  }

  // GOOGLE SEARCH
  const gs = reply.match(/\[GS:(.*?)\]/);
  if(gs) await openUrl(`https://www.google.com/search?q=${encodeURIComponent(gs[1])}`);

  // MAPS
  const map = reply.match(/\[MAP:(.*?)\]/);
  if(map) await openUrl(`https://maps.google.com?q=${encodeURIComponent(map[1])}`);

  // ALARM
  const alarm = reply.match(/\[ALARM:(.*?):(.*?)\]/);
  if(alarm) {
    const [h,m] = alarm[1].split(':').map(Number);
    showToast(`⏰ Alarm set: ${alarm[1]} — ${alarm[2]}`, 4000);
    const check = setInterval(() => {
      const now = new Date();
      if(now.getHours()===h && now.getMinutes()===m && now.getSeconds()<5) {
        clearInterval(check);
        speakText(`Boss, alarm! ${alarm[2]}`);
        showToast(`🔔 ${alarm[2]}`, 8000);
      }
    }, 3000);
  }

  // TIMER
  const timer = reply.match(/\[TIMER:(\d+):(.*?)\]/);
  if(timer) {
    showToast(`⏱ Timer: ${timer[1]}s`, 3000);
    setTimeout(() => {
      speakText(`Boss, timer khatam! ${timer[2]}`);
      showToast(`⏱ Done: ${timer[2]}`, 6000);
    }, parseInt(timer[1]) * 1000);
  }

  // CALC
  const calc = reply.match(/\[CALC:(.*?)\]/);
  if(calc) {
    try {
      const result = eval(calc[1].replace(/x/g,'*').replace(/÷/g,'/'));
      showToast(`= ${result}`, 4000);
    } catch(e) {}
  }

  // NOTE
  const note = reply.match(/\[NOTE:(.*?)\]/);
  if(note) showToast(`📝 Saved: ${note[1]}`, 4000);
}

// ===== SEND =====
async function sendMsg() {
  const inp = document.getElementById('txt-inp');
  const text = inp.value.trim();
  if(!text) return;
  inp.value = ''; inp.style.height = 'auto';
  await sendText(text);
}
function hKey(e) { if(e.key==='Enter' && !e.shiftKey){e.preventDefault(); sendMsg();} }
function aResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,80)+'px'; }

async function sendText(text) {
  if(!text) return;
  setStatus('PROCESSING'); setWave(false);
  try {
    const res = await fetch(`${API}/chat`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({message:text, password:PWD})
    });
    const data = await res.json();
    await handleAction(data.reply);
    addMsg(data.reply);
    setStatus('ONLINE');
    const clean = cleanReply(data.reply);
    if(clean) speakText(clean);
    document.body.addEventListener('click', () => {
  if(window.speechSynthesis) window.speechSynthesis.resume();
}, {once: true}); 
  } catch(e) { setStatus('ERROR'); showToast('Connection error!'); }
}

// ===== TTS =====
async function speakText(text) {
  if(!text) return;
  isSpeaking = true; setStatus('SPEAKING'); setWave(true);
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  const voices = window.speechSynthesis.getVoices();
  const preferred = voices.find(v => v.lang==='hi-IN' || v.lang==='en-IN' || v.name.includes('Google'));
  if(preferred) utt.voice = preferred;
  utt.lang = 'hi-IN'; utt.rate = 1.05; utt.pitch = 1.0; utt.volume = 1.0;
  await new Promise(resolve => { utt.onend = resolve; utt.onerror = resolve; window.speechSynthesis.speak(utt); });
  isSpeaking = false; setWave(false);
  setStatus(wakeOn ? 'SAY HEY IRIS' : 'ONLINE');
}
window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();

// ===== VOICE =====
function toggleVoice() { isListening ? stopVoice() : startVoice(); }
function startVoice() {
  if(!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) { setStatus('USE CHROME'); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  voiceRec = new SR();
  voiceRec.lang = 'hi-IN'; voiceRec.continuous = true; voiceRec.interimResults = false;
  voiceRec.onstart = () => {
    isListening = true;
    document.getElementById('mic-btn').classList.add('on');
    document.getElementById('mic-btn').textContent = '⏹';
    setStatus('LISTENING'); setWave(true);
  };
  voiceRec.onresult = async e => {
    const text = e.results[e.results.length-1][0].transcript.trim();
    if(!text) return;
    stopVoice();
    await sendText(text);
  };
  voiceRec.onerror = () => { stopVoice(); setStatus('RETRY'); };
  voiceRec.onend = () => { if(isListening) { try{voiceRec.start();}catch(e){} } };
  try { voiceRec.start(); } catch(e) { setStatus('MIC ERROR'); }
}
function stopVoice() {
  isListening = false;
  if(voiceRec) { try{voiceRec.stop();}catch(e){} voiceRec = null; }
  document.getElementById('mic-btn').classList.remove('on');
  document.getElementById('mic-btn').textContent = '🎤';
  setWave(false);
}

// ===== WAKE WORD =====
function toggleWake() { wakeOn ? stopWake() : startWake(); }
function startWake() {
  if(!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) return;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  wakeRec = new SR();
  wakeRec.continuous = true; wakeRec.interimResults = false; wakeRec.lang = 'hi-IN';
  wakeRec.onresult = e => {
    const said = e.results[e.results.length-1][0].transcript.toLowerCase();
    if(['hey iris','hi iris','ey iris','iris suno'].some(t => said.includes(t))) {
      if(!isListening && !isSpeaking) { playBeep(); setTimeout(() => startVoice(), 300); }
    }
  };
  wakeRec.onerror = () => {};
  wakeRec.onend = () => { if(wakeOn && !isSpeaking) { setTimeout(() => { try{wakeRec.start();}catch(e){} }, 600); } };
  try {
    wakeRec.start(); wakeOn = true;
    document.getElementById('wake-btn').classList.add('active');
    setStatus('SAY HEY IRIS');
    showToast('👂 Kaho "Hey IRIS"');
  } catch(e) {}
}
function stopWake() {
  wakeOn = false;
  if(wakeRec) { try{wakeRec.stop();}catch(e){} wakeRec = null; }
  document.getElementById('wake-btn').classList.remove('active');
  setStatus('ONLINE'); showToast('Wake word OFF');
}
function playBeep() {
  try {
    const ctx = new(window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = 1000;
    g.gain.setValueAtTime(0.06, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.1);
    o.start(ctx.currentTime); o.stop(ctx.currentTime+0.1);
  } catch(e) {}
}

      method: 'DELETE',
      headers: {'Content-Type':'application/json'},
